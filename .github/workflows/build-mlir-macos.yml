name: 🍎 Build Portable MLIR Toolchain

on:
  workflow_call:
    inputs:
      llvm-project-ref:
        description: "llvm-project ref or tag (e.g., llvmorg-22.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  macos-15:
    uses: ./.github/workflows/build-mlir-macos-runner.yml
    with:
      llvm-project-ref: ${{ inputs.llvm-project-ref }}
      runs-on: macos-15

  macos-15-intel:
    uses: ./.github/workflows/build-mlir-macos-runner.yml
    with:
      llvm-project-ref: ${{ inputs.llvm-project-ref }}
      runs-on: macos-15-intel
