name: Build Portable MLIR Toolchain (macOS Runner)

on:
  workflow_call:
    inputs:
      llvm-project-ref:
        description: "llvm-project ref or tag (e.g., llvmorg-22.1.0)"
        required: true
        type: string
      runs-on:
        description: "GitHub runner label (e.g., macos-15)"
        required: true
        type: string

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  NINJA_VERSION: 1.13.0
  ZSTD_VERSION: 1.5.7
  MOLD_VERSION: 2.40.4
  ZSTD_ARCHIVE_PATH: zstd-${{ env.ZSTD_VERSION }}-${{ inputs.runs-on }}.tar.zst
  ZSTD_EXE_PATH: ${{ github.workspace }}/zstd-${{ inputs.runs-on }}
  ZSTD_EXE_NAME: zstd-exe-${{ env.ZSTD_VERSION }}-${{ inputs.runs-on }}
  MOLD_ARCHIVE_PATH: mold-${{ env.MOLD_VERSION }}-${{ inputs.runs-on }}.tar.zst
  MLIR_ARCHIVE_PATH: llvm-mlir_${{ inputs.llvm-project-ref }}_release_${{ inputs.runs-on }}.tar.zst

jobs:
  build-zstd:
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build zstd"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Build zstd
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/macos/build-zstd.sh \
            -e ${{ env.ZSTD_EXE_PATH }} \
            -a ${{ env.ZSTD_ARCHIVE_PATH }} \
            -v ${{ env.ZSTD_VERSION }} \
            -n ${{ env.NINJA_VERSION }}
      - name: Upload zstd installation (temporary)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.ZSTD_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false
      - name: Upload zstd executable (final payload)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.ZSTD_EXE_PATH }}
          name: ${{ env.ZSTD_EXE_NAME }}
          if-no-files-found: error

  build-mold:
    needs: build-zstd
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build mold"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build mold
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/macos/build-mold.sh \
            -e ${{ env.ZSTD_EXE_PATH }} \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -a ${{ env.MOLD_ARCHIVE_PATH }} \
            -v ${{ env.MOLD_VERSION }} \
            -n ${{ env.NINJA_VERSION }}
      - name: Upload mold installation
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.MOLD_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  build-mlir-release:
    needs: build-mold
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build MLIR (Release)"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download mold installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MOLD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build and package MLIR (Release)
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/macos/build-mlir.sh \
            -r ${{ inputs.llvm-project-ref }} \
            -e ${{ env.ZSTD_EXE_PATH }} \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -m ${{ env.MOLD_ARCHIVE_PATH }} \
            -a ${{ env.MLIR_ARCHIVE_PATH }} \
            -n ${{ env.NINJA_VERSION }} \
            -b Release
      - name: Upload MLIR archive (Release)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.MLIR_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  test-release:
    needs: [build-zstd, build-mlir-release]
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Test MLIR Installation (Release)"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download mold installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MOLD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download MLIR archive (Release)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MLIR_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Test installation (Release)
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/macos/test-installation.sh \
            -e ${{ env.ZSTD_EXE_PATH }} \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -m ${{ env.MOLD_ARCHIVE_PATH }} \
            -a ${{ env.MLIR_ARCHIVE_PATH }} \
            -n ${{ env.NINJA_VERSION }} \
            -b Release
