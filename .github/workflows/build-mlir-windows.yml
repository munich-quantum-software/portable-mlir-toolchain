name: 🏁 Build Portable MLIR Toolchain

on:
  workflow_call:
    inputs:
      llvm-project-ref:
        description: "llvm-project ref or tag (e.g., llvmorg-22.1.0)"
        required: true
        type: string
      build-type:
        description: "Build type (Release or Debug)"
        required: false
        default: "Release"
        type: string

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [windows-2025, windows-11-arm]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate build-type
        shell: bash
        run: |
          if [[ "${{ inputs.build-type }}" != "Release" && "${{ inputs.build-type }}" != "Debug" ]]; then
            echo "Error: build-type must be 'Release' or 'Debug', got '${{ inputs.build-type }}'"
            exit 1
          fi

      - name: Disk usage (before cleanup)
        shell: pwsh
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | Format-Table -AutoSize

      - name: Free up some space
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'

          function Remove-IfExists([string]$Path) {
            if (Test-Path $Path) {
              Write-Host "Removing $Path"
              Remove-Item -Recurse -Force $Path -ErrorAction SilentlyContinue
            }
          }

          # Big optional stacks we don't need for this job
          Remove-IfExists "C:\azureCLI"
          Remove-IfExists "C:\azureDevOpsCli"
          Remove-IfExists "C:\Android\android-sdk"
          Remove-IfExists "C:\hostedtoolcache"
          Remove-IfExists "C:\Julia"
          Remove-IfExists "C:\mingw32"
          Remove-IfExists "C:\mingw64"
          Remove-IfExists "C:\npm"
          Remove-IfExists "C:\ghcup"
          Remove-IfExists "C:\rtools45"
          Remove-IfExists "C:\msys64"
          Remove-IfExists "C:\Strawberry"
          Remove-IfExists "C:\PostgreSQL"
          Remove-IfExists "C:\aliyun-cli"
          Remove-IfExists "C:\temp"
          Remove-IfExists "C:\Program Files\Amazon"
          Remove-IfExists "C:\Program Files\Android"
          Remove-IfExists "C:\Program Files\Azure Cosmos DB Emulator"
          Remove-IfExists "C:\Program Files\dotnet"
          Remove-IfExists "C:\Program Files\ghc"
          Remove-IfExists "C:\Program Files\Google"
          Remove-IfExists "C:\Program Files\Internet Explorer"
          Remove-IfExists "C:\Program Files\LLVM"
          Remove-IfExists "C:\Program Files\Microsoft\Edge"
          Remove-IfExists "C:\Program Files\Mozilla Firefox"
          Remove-IfExists "C:\Program Files\MySQL"
          Remove-IfExists "C:\Program Files\nodejs"
          Remove-IfExists "C:\Program Files\Windows Mail"
          Remove-IfExists "C:\Program Files\Windows Media Player"
          Remove-IfExists "C:\Program Files\Windows NT"
          Remove-IfExists "C:\Program Files\Windows Photo Viewer"
          Remove-IfExists "C:\Program Files (x86)\Android"
          Remove-IfExists "C:\Program Files (x86)\Epic Games"
          Remove-IfExists "C:\Program Files (x86)\Internet Explorer"
          Remove-IfExists "C:\Program Files (x86)\Google"
          Remove-IfExists "C:\Program Files (x86)\Microsoft\Edge"
          Remove-IfExists "C:\Program Files (x86)\Windows Mail"
          Remove-IfExists "C:\Program Files (x86)\Windows Media Player"
          Remove-IfExists "C:\Program Files (x86)\Windows NT"
          Remove-IfExists "C:\Program Files (x86)\Windows Photo Viewer"
          Remove-IfExists "C:\Selenium"
          Remove-IfExists "C:\SeleniumWebDrivers"
          Remove-IfExists "C:\vcpkg"
          Remove-IfExists "$env:AGENT_TOOLSDIRECTORY"

          # Conda
          Remove-IfExists "C:\Miniconda"

          try {
            wsl --shutdown | Out-Null
            Remove-IfExists "$env:LOCALAPPDATA\Packages\CanonicalGroupLimited.Ubuntu*"
            Remove-IfExists "$env:LOCALAPPDATA\Packages\TheDebianProject.DebianGNULinux*"
            Remove-IfExists "$env:LOCALAPPDATA\Packages\kali-linux.*"
          } catch {}

          # Docker
          try {
            docker system prune -af --volumes | Out-Null
          } catch {}
          Remove-IfExists "C:\ProgramData\Docker"

          # Generic temp caches
          Remove-IfExists "C:\Windows\Temp"
          Remove-IfExists "$env:TEMP"
          Remove-IfExists "$env:LOCALAPPDATA\Temp"

          # Clean NuGet cache
          try { dotnet nuget locals all --clear | Out-Null } catch {}

          # Recreate user temp directories for later workflow steps.
          foreach ($tempPath in @($env:TEMP, "$env:LOCALAPPDATA\Temp")) {
            if ($tempPath -and -not (Test-Path $tempPath)) {
              New-Item -ItemType Directory -Path $tempPath -Force | Out-Null
            }
          }

          # Never fail the job because cleanup couldn't remove something.
          exit 0
      - name: Disk usage (after cleanup)
        shell: pwsh
        run: |
          Get-PSDrive -PSProvider FileSystem | Sort-Object Name | Format-Table -AutoSize
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Build
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\build.ps1 -llvm_project_ref ${{ inputs.llvm-project-ref }} -install_prefix ${{ github.workspace }}\llvm-install -build_type ${{ inputs.build-type }}
      - name: Upload archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.runs-on }}-${{ inputs.build-type }}-archive
          path: |
            llvm-mlir_*.tar.zst
            zstd-*.zip
          if-no-files-found: error
          overwrite: true

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        runs-on: [windows-2025, windows-11-arm]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ matrix.runs-on }}-${{ inputs.build-type }}-archive
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Test installation
        shell: pwsh
        run: |
          $zstd_zip = Get-Item zstd-*.zip | Select-Object -First 1
          Expand-Archive -Path $zstd_zip.FullName -DestinationPath "${{ github.workspace }}\zstd-install"

          $archive = Get-Item llvm-mlir_*.tar.zst | Select-Object -First 1

          & "${{ github.workspace }}\scripts\toolchain\windows\test-installation.ps1" `
            -ArchivePath $archive.FullName `
            -ZstdInstallPrefix "${{ github.workspace }}\zstd-install" `
            -BuildType ${{ inputs.build-type }}
