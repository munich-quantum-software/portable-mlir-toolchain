name: Build Portable MLIR Toolchain (macOS Runner)

on:
  workflow_call:
    inputs:
      llvm-project-ref:
        description: "llvm-project ref or tag (e.g., llvmorg-22.1.0)"
        required: true
        type: string
      runs-on:
        description: "GitHub runner label (e.g., macos-15)"
        required: true
        type: string
      zstd-version:
        description: "zstd version (e.g., 1.5.7)"
        default: "1.5.7"
        required: false
        type: string
      ninja-version:
        description: "ninja version (e.g., 1.13.0)"
        default: "1.13.0"
        required: false
        type: string

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  ZSTD_ARCHIVE_PATH: zstd-${{ inputs.zstd-version }}_${{ inputs.runs-on == 'macos-15' && 'arm64-apple-darwin' || 'x86_64-apple-darwin' }}.tar.gz
  MLIR_ARCHIVE_PATH: llvm-mlir_${{ inputs.llvm-project-ref }}_${{ inputs.runs-on == 'macos-15' && 'arm64-apple-darwin' || 'x86_64-apple-darwin' }}.tar.zst

jobs:
  build-zstd:
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build zstd"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Build zstd
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/macos/build-zstd.sh \
            -a ${{ env.ZSTD_ARCHIVE_PATH }} \
            -v ${{ inputs.zstd-version }} \
            -n ${{ inputs.ninja-version }}
      - name: Upload zstd executable (final payload)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.ZSTD_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  build-mlir-release:
    needs: [build-zstd]
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build MLIR (Release)"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build and package MLIR (Release)
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/macos/build-mlir.sh \
            -r ${{ inputs.llvm-project-ref }} \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -a ${{ env.MLIR_ARCHIVE_PATH }} \
            -n ${{ inputs.ninja-version }} \
            -b Release
      - name: Upload MLIR archive (Release)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.MLIR_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  test-release:
    needs: [build-mlir-release]
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Test MLIR Installation (Release)"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download MLIR archive (Release)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.MLIR_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Test installation (Release)
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/macos/test-installation.sh \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -a ${{ env.MLIR_ARCHIVE_PATH }} \
            -n ${{ inputs.ninja-version }} \
            -b Release
