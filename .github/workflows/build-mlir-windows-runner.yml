name: Build Portable MLIR Toolchain (Windows Runner)

on:
  workflow_call:
    inputs:
      llvm-project-ref:
        description: "llvm-project ref or tag (e.g., llvmorg-22.1.0)"
        required: true
        type: string
      runs-on:
        description: "GitHub runner label (e.g., windows-2025)"
        required: true
        type: string

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  NINJA_VERSION: 1.13.0
  ZSTD_VERSION: 1.5.7
  ZSTD_ARCHIVE_PATH: zstd-1.5.7-${{ inputs.runs-on }}.tar.zst
  ZSTD_EXE_PATH: ${{ github.workspace }}\zstd.exe
  ZSTD_EXE_NAME: zstd-exe-1.5.7-${{ inputs.runs-on }}
  MOLD_VERSION: 2.40.4
  MOLD_ARCHIVE_PATH: mold-2.40.4-${{ inputs.runs-on }}.tar.zst

jobs:
  build-zstd:
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build zstd"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Build zstd (Release)
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\build-zstd.ps1 `
            -ZstdExePath ${{ env.ZSTD_EXE_PATH }} `
            -ZstdArchivePath ${{ env.ZSTD_ARCHIVE_PATH }} `
            -NinjaVersion ${{ env.NINJA_VERSION }} `
            -ZstdVersion ${{ env.ZSTD_VERSION }}
      - name: Upload zstd installation (temporary)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.ZSTD_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false
      - name: Upload zstd executable (final payload)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.ZSTD_EXE_PATH }}
          name: ${{ env.ZSTD_EXE_NAME }}
          if-no-files-found: error

  build-mold:
    needs: build-zstd
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build mold"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build mold
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\build-mold.ps1 `
            -ZstdExePath ${{ env.ZSTD_EXE_PATH }} `
            -ZstdArchivePath ${{ env.ZSTD_ARCHIVE_PATH }} `
            -MoldArchivePath ${{ env.MOLD_ARCHIVE_PATH }} `
            -MoldVersion ${{ env.MOLD_VERSION }} `
            -NinjaVersion ${{ env.NINJA_VERSION }}
      - name: Upload mold installation
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.MOLD_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  build-mlir-release:
    needs: build-mold
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build MLIR (Release)"
    env:
      MLIR_ARCHIVE_PATH: llvm-mlir_${{ inputs.llvm-project-ref }}_release.tar.zst
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Free up space on runner
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\cleanup-runner.ps1
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download mold installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MOLD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build and package MLIR (Release)
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\build-mlir.ps1 `
            -LlvmProjectRef ${{ inputs.llvm-project-ref }} `
            -ZstdExePath ${{ env.ZSTD_EXE_PATH }} `
            -ZstdArchivePath ${{ env.ZSTD_ARCHIVE_PATH }} `
            -MoldArchivePath ${{ env.MOLD_ARCHIVE_PATH }} `
            -MlirArchivePath ${{ env.MLIR_ARCHIVE_PATH }} `
            -NinjaVersion ${{ env.NINJA_VERSION }} `
            -BuildType Release
      - name: Upload MLIR archive (Release)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.MLIR_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  build-mlir-debug:
    needs: build-mold
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build MLIR (Debug)"
    env:
      MLIR_ARCHIVE_PATH: llvm-mlir_${{ inputs.llvm-project-ref }}_debug.tar.zst
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Free up space on runner
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\cleanup-runner.ps1
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download mold installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MOLD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build and package MLIR (Debug)
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\build-mlir.ps1 `
            -LlvmProjectRef ${{ inputs.llvm-project-ref }} `
            -ZstdExePath ${{ env.ZSTD_EXE_PATH }} `
            -ZstdArchivePath ${{ env.ZSTD_ARCHIVE_PATH }} `
            -MoldArchivePath ${{ env.MOLD_ARCHIVE_PATH }} `
            -MlirArchivePath ${{ env.MLIR_ARCHIVE_PATH }} `
            -NinjaVersion ${{ env.NINJA_VERSION }} `
            -BuildType Debug
      - name: Upload MLIR archive (Debug)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ env.MLIR_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  test-release:
    needs: [build-zstd, build-mlir-release]
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Test MLIR Installation (Release)"
    env:
      MLIR_ARCHIVE_PATH: llvm-mlir_${{ inputs.llvm-project-ref }}_release.tar.zst
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download mold installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MOLD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download MLIR archive (Release)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MLIR_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Test installation (Release)
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\test-installation.ps1 `
            -ZstdExePath ${{ env.ZSTD_EXE_PATH }} `
            -ZstdArchivePath ${{ env.ZSTD_ARCHIVE_PATH }} `
            -MoldArchivePath ${{ env.MOLD_ARCHIVE_PATH }} `
            -MlirArchivePath ${{ env.MLIR_ARCHIVE_PATH }} `
            -NinjaVersion ${{ env.NINJA_VERSION }} `
            -BuildType Release

  test-debug:
    needs: [build-zstd, build-mlir-debug]
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Test MLIR Installation (Debug)"
    env:
      MLIR_ARCHIVE_PATH: ${{ github.workspace }}\llvm-mlir_${{ inputs.llvm-project-ref }}_debug.tar.zst
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_EXE_NAME }}
      - name: Download zstd installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download mold installation archive
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MOLD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download MLIR archive (Debug)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ env.MLIR_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Test installation (Debug)
        shell: pwsh
        run: |
          & ${{ github.workspace }}\scripts\toolchain\windows\test-installation.ps1 `
            -ZstdExePath ${{ env.ZSTD_EXE_PATH }} `
            -ZstdArchivePath ${{ env.ZSTD_ARCHIVE_PATH }} `
            -MoldArchivePath ${{ env.MOLD_ARCHIVE_PATH }} `
            -MlirArchivePath ${{ env.MLIR_ARCHIVE_PATH }} `
            -NinjaVersion ${{ env.NINJA_VERSION }} `
            -BuildType Debug
