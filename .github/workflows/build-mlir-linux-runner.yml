name: Build Portable MLIR Toolchain (Linux Runner)

on:
  workflow_call:
    inputs:
      llvm-project-ref:
        description: "llvm-project ref or tag (e.g., llvmorg-22.1.7)"
        required: true
        type: string
      runs-on:
        description: "GitHub runner label (e.g., ubuntu-24.04)"
        required: true
        type: string
      zstd-version:
        description: "zstd version (e.g., 1.5.7)"
        default: "1.5.7"
        required: false
        type: string
      mold-version:
        description: "mold version (e.g., 2.41.0)"
        default: "2.41.0"
        required: false
        type: string

permissions:
  contents: read

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  ZSTD_ARCHIVE_PATH: zstd-${{ inputs.zstd-version }}_${{ inputs.runs-on == 'ubuntu-24.04' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}.tar.gz
  MOLD_ARCHIVE_PATH: mold-${{ inputs.mold-version }}_${{ inputs.runs-on == 'ubuntu-24.04' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}.tar.zst
  MLIR_ARCHIVE_PATH: llvm-mlir_${{ inputs.llvm-project-ref }}_${{ inputs.runs-on == 'ubuntu-24.04' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}.tar.zst

jobs:
  build-zstd:
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build zstd"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Build zstd
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/linux/build-zstd.sh \
            -a ${{ env.ZSTD_ARCHIVE_PATH }} \
            -v ${{ inputs.zstd-version }}
      - name: Upload zstd executable (final payload)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ env.ZSTD_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  build-mold:
    needs: build-zstd
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build mold"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build mold
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/linux/build-mold.sh \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -a ${{ env.MOLD_ARCHIVE_PATH }} \
            -v ${{ inputs.mold-version }}
      - name: Upload mold installation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ env.MOLD_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  build-mlir-release:
    needs: [build-mold]
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Build MLIR (Release)"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download mold installation archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.MOLD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Build and package MLIR (Release)
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/linux/build-mlir.sh \
            -r ${{ inputs.llvm-project-ref }} \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -m ${{ env.MOLD_ARCHIVE_PATH }} \
            -a ${{ env.MLIR_ARCHIVE_PATH }} \
            -b Release
      - name: Upload MLIR archive (Release)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ env.MLIR_ARCHIVE_PATH }}
          if-no-files-found: error
          archive: false

  test-release:
    needs: [build-mlir-release]
    runs-on: ${{ inputs.runs-on }}
    name: "${{ inputs.runs-on }}: Test MLIR Installation (Release)"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: 3.14
          activate-environment: true
          enable-cache: false
      - name: Download zstd executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ZSTD_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Download MLIR archive (Release)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.MLIR_ARCHIVE_PATH }}
          skip-decompress: true
      - name: Test installation (Release)
        run: |
          bash ${{ github.workspace }}/scripts/toolchain/linux/test-installation.sh \
            -z ${{ env.ZSTD_ARCHIVE_PATH }} \
            -a ${{ env.MLIR_ARCHIVE_PATH }} \
            -b Release
